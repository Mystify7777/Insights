<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RPG Creature Search</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Input + Button -->
  <input id="search-input" required />
  <button id="search-button">Search</button>

  <!-- Creature Info -->
  <h2 id="creature-name"></h2>
  <p id="creature-id"></p>
  <p id="weight"></p>
  <p id="height"></p>

  <div id="types"></div>

  <p id="hp"></p>
  <p id="attack"></p>
  <p id="defense"></p>
  <p id="special-attack"></p>
  <p id="special-defense"></p>
  <p id="speed"></p>

  <script src="script.js"></script>
</body>
</html>
